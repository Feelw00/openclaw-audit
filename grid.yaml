# ────────────────────────────────────────────────────────────
# 상태 전이 (셀 단위, grid.yaml 내 관리)
# ────────────────────────────────────────────────────────────
states:
  - unseeded          # Phase 2, 아직 시작 안 함
  - planned           # Phase 1, 대기 중
  - in_progress       # 에이전트 실행 중
  - done              # FIND 생성됨 (validate 통과 또는 반려)
  - integrated        # clusterer 가 처리 완료
  - verified          # 최소 1개 FIND 가 gatekeeper 통과
  - published         # 최소 1개 Issue 발행
  - skipped           # 의도적 스킵 (사유 명시)
