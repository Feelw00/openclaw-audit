# openclaw 신뢰성 감사 — 셀 인벤토리
#
# 셀 = (domain, type). 한 셀 = 한 에이전트 호출 = FIND 최대 5건.
# 페르소나별 1개 타입 전담, 도메인별 코드 범위 분리.
#
# 실행 시 각 페르소나의 allowed_paths 내부만 Grep/Read 허용 (토큰 절약 + scope 유지).

version: 1
target_project_root: /Users/lucas/Project/openclaw

# ────────────────────────────────────────────────────────────
# 타입 (문제 유형 × 담당 페르소나)
# ────────────────────────────────────────────────────────────
types:
  - id: memory
    name: 메모리 누수·무제한 성장
    agent: memory-leak-hunter
    focus: 'Map/Set unbounded, setInterval 미정리, EventEmitter 리스너 누적, WeakRef 미사용'

  - id: lifecycle
    name: 초기화·해제 비대칭
    agent: plugin-lifecycle-auditor
    focus: 'load 실패 rollback 부재, unload/dispose 경로 누락, jiti 캐시 일관성'

  - id: concurrency
    name: 동시성·레이스
    agent: cron-reliability-auditor    # 크론 도메인 겸업. 비-크론은 concurrency-auditor 후속
    focus: 'Promise.race loser 처리, 공유 state 락 없음, catch-up ordering'

  - id: error-boundary
    name: 에러 경계 누락
    agent: error-boundary-auditor
    focus: 'unhandledRejection, floating promise, process.exit pre-cleanup, JSON.parse'

# 지연 도입 — 셀 생산성 나오면 추가
#  - id: shutdown
#    name: 종료 시퀀스 누락
#    agent: shutdown-auditor

# ────────────────────────────────────────────────────────────
# 도메인 (코드 범위)
# ────────────────────────────────────────────────────────────
domains:
  - id: plugins
    name: 플러그인 시스템
    allowed_paths:
      - 'src/plugins/**'
      - 'src/plugin-sdk/**'
    priority_files:
      - src/plugins/loader.ts
      - src/plugins/registry.ts
      - src/plugins/manifest-registry.ts
      - src/plugins/discovery.ts

  - id: cron
    name: 크론·스케줄러
    allowed_paths:
      - 'src/cron/**'
    priority_files:
      - src/cron/service/timer.ts
      - src/cron/store.ts
      - src/cron/schedule.ts
      - src/cron/delivery.ts

  - id: agents-registry
    name: 에이전트 런타임 레지스트리
    allowed_paths:
      - 'src/agents/subagent-registry*.ts'
      - 'src/agents/subagent-registry-memory.ts'
      - 'src/agents/live-cache-test-support.ts'
    priority_files:
      - src/agents/subagent-registry.ts
      - src/agents/subagent-registry-memory.ts

  - id: infra-process
    name: 프로세스·에러 경계
    allowed_paths:
      - 'src/infra/unhandled-rejections.ts'
      - 'src/infra/process-respawn.ts'
      - 'src/infra/restart.ts'
      - 'src/infra/abort-signal.ts'
      - 'src/infra/approval-handler-runtime.ts'
    priority_files:
      - src/infra/unhandled-rejections.ts
      - src/infra/process-respawn.ts

  - id: infra-retry
    name: 재시도·백오프
    allowed_paths:
      - 'src/infra/retry*.ts'
      - 'src/infra/backoff.ts'
    priority_files:
      - src/infra/retry.ts
      - src/infra/retry-policy.ts
      - src/infra/backoff.ts

  - id: gateway
    name: 게이트웨이 (control plane)
    allowed_paths:
      - 'src/gateway/**'
    priority_files:
      - src/gateway/protocol/schema.ts
      - src/gateway/auth-rate-limit.ts
      - src/gateway/agent-event-assistant-text.ts
      - src/gateway/assistant-identity.ts

  - id: channels
    name: 채널 라우팅·바인딩
    allowed_paths:
      - 'src/channels/**'
      - 'src/routing/**'
    priority_files:
      - src/channels/allow-from.ts
      - src/channels/ack-reactions.ts
      - src/routing/bindings.ts
      - src/routing/account-lookup.ts

  - id: auto-reply
    name: 자동 응답 큐·chunk·draing
    allowed_paths:
      - 'src/auto-reply/**'
    priority_files:
      - src/auto-reply/chunk.ts
      - src/auto-reply/reply/queue/drain.ts  # upstream 최근 fix(queue) 영역
      - src/auto-reply/command-detection.ts

  - id: context-engine
    name: 컨텍스트 엔진 (세션 컨텍스트·레거시 registry)
    allowed_paths:
      - 'src/context-engine/**'
    priority_files:
      - src/context-engine/registry.ts
      - src/context-engine/delegate.ts
      - src/context-engine/init.ts
      - src/context-engine/legacy.ts

  - id: mcp
    name: MCP (Model Context Protocol) — server + client transport
    allowed_paths:
      - 'src/mcp/**'
      - 'src/agents/mcp-stdio.ts'
      - 'src/agents/mcp-stdio-transport.ts'
      - 'src/agents/mcp-http.ts'
      - 'src/agents/mcp-transport.ts'
      - 'src/agents/mcp-transport-config.ts'
      - 'src/agents/mcp-config-shared.ts'
      - 'src/config/mcp-config.ts'
      - 'src/cli/mcp-cli.ts'
    priority_files:
      - src/mcp/channel-server.ts
      - src/mcp/channel-bridge.ts
      - src/mcp/tools-stdio-server.ts
      - src/mcp/plugin-tools-handlers.ts
      - src/mcp/plugin-tools-serve.ts
      - src/mcp/openclaw-tools-serve.ts
      - src/agents/mcp-stdio-transport.ts
      - src/agents/mcp-config-shared.ts

